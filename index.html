<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Машин букет для мамы</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: fixed;
            touch-action: none;
            background-color: #2c3e50;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 177.78vw;
            max-width: 405px;
            max-height: 720px;
            background-color: #4CAF50;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            margin: auto;
        }

        .background-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('fon.jpg');
            background-size: cover;
            background-position: center;
            z-index: 1;
        }

        .start-button {
            position: absolute;
            bottom: 20%;
            left: 50%;
            transform: translateX(-50%);
            padding: 15px 40px;
            font-size: 28px;
            background: #FF69B4;
            color: white;
            border: none;
            border-radius: 60px;
            cursor: pointer;
            box-shadow: 0 8px 0 #C71585;
            font-weight: bold;
            z-index: 30;
            border: 3px solid #FFD700;
        }

        .start-button:active {
            transform: translateX(-50%) translateY(6px);
            box-shadow: 0 2px 0 #C71585;
        }

        .start-button.hidden {
            display: none;
        }

        .konvert-container {
            position: absolute;
            top: 5%;
            left: 50%;
            transform: translateX(-50%);
            width: 25%;
            max-width: 100px;
            z-index: 15;
            cursor: pointer;
            filter: drop-shadow(0 4px 4px rgba(0,0,0,0.3));
            transition: transform 0.2s;
        }

        .konvert-container:active {
            transform: translateX(-50%) scale(1.1);
        }

        .konvert-container img {
            width: 100%;
            height: auto;
            display: block;
        }

        .konvert-container.hidden {
            display: none;
        }

        .korzina-container {
            position: absolute;
            top: 5%;
            left: 50%;
            transform: translateX(-50%);
            width: 20%;
            max-width: 80px;
            z-index: 15;
            filter: drop-shadow(0 4px 4px rgba(0,0,0,0.3));
            cursor: pointer;
            pointer-events: none; /* Корзина не перехватывает события */
        }

        .korzina-container img {
            width: 100%;
            height: auto;
            display: block;
        }

        .korzina-container.hidden {
            display: none;
        }

        .counters {
            position: absolute;
            top: 5%;
            right: 3%;
            z-index: 20;
            display: flex;
            flex-direction: column;
            gap: 8px;
            background: rgba(255,255,255,0.8);
            padding: 10px;
            border-radius: 20px;
            border: 2px solid #FF69B4;
        }

        .counter-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 20px;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .counter-item.completed {
            opacity: 0;
            pointer-events: none;
            transform: scale(0);
            display: none;
        }

        .counter-item img {
            width: 30px;
            height: 30px;
        }

        .counters.hidden {
            display: none;
        }

        .flower {
            position: absolute;
            width: 10%;
            height: auto;
            cursor: pointer;
            touch-action: manipulation;
            user-select: none;
            filter: drop-shadow(0 4px 4px rgba(0,0,0,0.2));
            z-index: 10;
            transition: all 0.2s ease;
        }

        .flower:active {
            transform: scale(1.1);
        }

        .flower.found {
            opacity: 0;
            pointer-events: none;
            transition: all 0.5s ease;
        }

        .flower.hidden {
            display: none;
        }

        .grid-flower {
            position: absolute;
            width: 8%;
            height: auto;
            cursor: grab;
            touch-action: none;
            user-select: none;
            filter: drop-shadow(0 4px 4px rgba(0,0,0,0.2));
            z-index: 10;
            transition: all 0.2s ease;
        }

        .grid-flower:active {
            cursor: grabbing;
            transform: scale(1.1);
        }

        .grid-flower.found {
            opacity: 0;
            pointer-events: none;
            transition: all 0.5s ease;
        }

        .grid-flower.hidden {
            display: none !important;
        }

        .grid-flower.dragging {
            transition: none;
            z-index: 100;
            cursor: grabbing;
        }

        #flower-romashka { left: 10%; top: 30%; }
        #flower-rosa { left: 30%; top: 40%; }
        #flower-tulpan { left: 50%; top: 35%; }
        #flower-gvozdika { left: 70%; top: 45%; }
        #flower-pion { left: 20%; top: 60%; }
        #flower-vasilek { left: 80%; top: 25%; }

        .pos-1 { left: 5%; top: 25%; }
        .pos-2 { left: 21%; top: 25%; }
        .pos-3 { left: 37%; top: 25%; }
        .pos-4 { left: 53%; top: 25%; }
        .pos-5 { left: 69%; top: 25%; }
        .pos-6 { left: 85%; top: 25%; }
        .pos-7 { left: 5%; top: 40%; }
        .pos-8 { left: 21%; top: 40%; }
        .pos-9 { left: 37%; top: 40%; }
        .pos-10 { left: 53%; top: 40%; }
        .pos-11 { left: 69%; top: 40%; }
        .pos-12 { left: 85%; top: 40%; }
        .pos-13 { left: 5%; top: 55%; }
        .pos-14 { left: 21%; top: 55%; }
        .pos-15 { left: 37%; top: 55%; }
        .pos-16 { left: 53%; top: 55%; }
        .pos-17 { left: 69%; top: 55%; }
        .pos-18 { left: 85%; top: 55%; }
        .pos-19 { left: 5%; top: 70%; }
        .pos-20 { left: 21%; top: 70%; }
        .pos-21 { left: 37%; top: 70%; }
        .pos-22 { left: 53%; top: 70%; }
        .pos-23 { left: 69%; top: 70%; }
        .pos-24 { left: 85%; top: 70%; }

        #bouquet-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(255, 200, 230, 0.95);
            z-index: 100;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
        }

        .bouquet-img {
            width: 70%;
            max-width: 300px;
            margin-bottom: 20px;
            border: 5px solid white;
            border-radius: 20px;
            box-shadow: 0 10px 0 #C71585;
        }

        .bouquet-text {
            font-size: 28px;
            color: #C71585;
            font-weight: bold;
            text-align: center;
            text-shadow: 2px 2px 0 white;
            margin-bottom: 30px;
            padding: 0 20px;
        }

        .next-button {
            padding: 15px 40px;
            font-size: 24px;
            background: #FF69B4;
            color: white;
            border: none;
            border-radius: 60px;
            cursor: pointer;
            box-shadow: 0 5px 0 #C71585;
            font-weight: bold;
            border: 2px solid white;
        }

        .next-button:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #C71585;
        }

        #gift-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(255, 220, 240, 0.95);
            z-index: 110;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
        }

        .gift-img {
            width: 60%;
            max-width: 250px;
            margin-bottom: 20px;
            border-radius: 20px;
            border: 5px solid white;
        }

        .gift-text {
            font-size: 26px;
            color: #C71585;
            font-weight: bold;
            text-align: center;
            margin-bottom: 30px;
            padding: 0 20px;
            line-height: 1.4;
        }

        .pdf-button {
            padding: 18px 40px;
            font-size: 24px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 60px;
            cursor: pointer;
            box-shadow: 0 6px 0 #2E7D32;
            font-weight: bold;
            margin-top: 20px;
            border: 3px solid white;
        }

        .pdf-button:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #2E7D32;
        }

        .again-button {
            padding: 12px 30px;
            font-size: 20px;
            background: #FF69B4;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 0 #C71585;
            margin-top: 20px;
        }

        @keyframes shake {
            0% { transform: translateX(0); }
            20% { transform: translateX(-10px); }
            40% { transform: translateX(10px); }
            60% { transform: translateX(-5px); }
            80% { transform: translateX(5px); }
            100% { transform: translateX(0); }
        }

        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        .shake {
            animation: shake 0.4s ease-in-out;
        }

        .bounce {
            animation: bounce 0.5s ease;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div class="background-layer"></div>

        <button class="start-button" id="start-btn" onclick="startGame()">🌷 СДЕЛАТЬ ПОДАРОК МАМЕ 🌷</button>

        <div class="konvert-container hidden" id="konvert" onclick="nextHint()">
            <img src="konvert.png" alt="Конверт">
        </div>

        <div class="korzina-container hidden" id="korzina">
            <img src="korzina.png" alt="Корзина">
        </div>

        <div class="counters hidden" id="counters">
            <div class="counter-item" id="counter-romashka">
                <img src="romashka.png" alt="Ромашка"> <span id="romashka-left">4</span>
            </div>
            <div class="counter-item" id="counter-rosa">
                <img src="rosa.png" alt="Роза"> <span id="rosa-left">2</span>
            </div>
            <div class="counter-item" id="counter-tulpan">
                <img src="tulpan.png" alt="Тюльпан"> <span id="tulpan-left">5</span>
            </div>
        </div>

        <!-- Первый этап: 6 цветов -->
        <img src="romashka.png" class="flower" id="flower-romashka" data-name="romashka" onclick="checkFlower('romashka', this)">
        <img src="rosa.png" class="flower" id="flower-rosa" data-name="rosa" onclick="checkFlower('rosa', this)">
        <img src="tulpan.png" class="flower" id="flower-tulpan" data-name="tulpan" onclick="checkFlower('tulpan', this)">
        <img src="gvozdika.png" class="flower" id="flower-gvozdika" data-name="gvozdika" onclick="checkFlower('gvozdika', this)">
        <img src="pion.png" class="flower" id="flower-pion" data-name="pion" onclick="checkFlower('pion', this)">
        <img src="vasilek.png" class="flower" id="flower-vasilek" data-name="vasilek" onclick="checkFlower('vasilek', this)">

        <!-- Второй этап: 24 цветка (8 каждого вида) -->
        <!-- 8 ромашек -->
        <img src="romashka.png" class="grid-flower hidden" id="grid-romashka-1" data-name="romashka" onmousedown="startDrag(event)" ontouchstart="startDrag(event)">
        <img src="romashka.png" class="grid-flower hidden" id="grid-romashka-2" data-name="romashka" onmousedown="startDrag(event)" ontouchstart="startDrag(event)">
        <img src="romashka.png" class="grid-flower hidden" id="grid-romashka-3" data-name="romashka" onmousedown="startDrag(event)" ontouchstart="startDrag(event)">
        <img src="romashka.png" class="grid-flower hidden" id="grid-romashka-4" data-name="romashka" onmousedown="startDrag(event)" ontouchstart="startDrag(event)">
        <img src="romashka.png" class="grid-flower hidden" id="grid-romashka-5" data-name="romashka" onmousedown="startDrag(event)" ontouchstart="startDrag(event)">
        <img src="romashka.png" class="grid-flower hidden" id="grid-romashka-6" data-name="romashka" onmousedown="startDrag(event)" ontouchstart="startDrag(event)">
        <img src="romashka.png" class="grid-flower hidden" id="grid-romashka-7" data-name="romashka" onmousedown="startDrag(event)" ontouchstart="startDrag(event)">
        <img src="romashka.png" class="grid-flower hidden" id="grid-romashka-8" data-name="romashka" onmousedown="startDrag(event)" ontouchstart="startDrag(event)">

        <!-- 8 роз -->
        <img src="rosa.png" class="grid-flower hidden" id="grid-rosa-1" data-name="rosa" onmousedown="startDrag(event)" ontouchstart="startDrag(event)">
        <img src="rosa.png" class="grid-flower hidden" id="grid-rosa-2" data-name="rosa" onmousedown="startDrag(event)" ontouchstart="startDrag(event)">
        <img src="rosa.png" class="grid-flower hidden" id="grid-rosa-3" data-name="rosa" onmousedown="startDrag(event)" ontouchstart="startDrag(event)">
        <img src="rosa.png" class="grid-flower hidden" id="grid-rosa-4" data-name="rosa" onmousedown="startDrag(event)" ontouchstart="startDrag(event)">
        <img src="rosa.png" class="grid-flower hidden" id="grid-rosa-5" data-name="rosa" onmousedown="startDrag(event)" ontouchstart="startDrag(event)">
        <img src="rosa.png" class="grid-flower hidden" id="grid-rosa-6" data-name="rosa" onmousedown="startDrag(event)" ontouchstart="startDrag(event)">
        <img src="rosa.png" class="grid-flower hidden" id="grid-rosa-7" data-name="rosa" onmousedown="startDrag(event)" ontouchstart="startDrag(event)">
        <img src="rosa.png" class="grid-flower hidden" id="grid-rosa-8" data-name="rosa" onmousedown="startDrag(event)" ontouchstart="startDrag(event)">

        <!-- 8 тюльпанов -->
        <img src="tulpan.png" class="grid-flower hidden" id="grid-tulpan-1" data-name="tulpan" onmousedown="startDrag(event)" ontouchstart="startDrag(event)">
        <img src="tulpan.png" class="grid-flower hidden" id="grid-tulpan-2" data-name="tulpan" onmousedown="startDrag(event)" ontouchstart="startDrag(event)">
        <img src="tulpan.png" class="grid-flower hidden" id="grid-tulpan-3" data-name="tulpan" onmousedown="startDrag(event)" ontouchstart="startDrag(event)">
        <img src="tulpan.png" class="grid-flower hidden" id="grid-tulpan-4" data-name="tulpan" onmousedown="startDrag(event)" ontouchstart="startDrag(event)">
        <img src="tulpan.png" class="grid-flower hidden" id="grid-tulpan-5" data-name="tulpan" onmousedown="startDrag(event)" ontouchstart="startDrag(event)">
        <img src="tulpan.png" class="grid-flower hidden" id="grid-tulpan-6" data-name="tulpan" onmousedown="startDrag(event)" ontouchstart="startDrag(event)">
        <img src="tulpan.png" class="grid-flower hidden" id="grid-tulpan-7" data-name="tulpan" onmousedown="startDrag(event)" ontouchstart="startDrag(event)">
        <img src="tulpan.png" class="grid-flower hidden" id="grid-tulpan-8" data-name="tulpan" onmousedown="startDrag(event)" ontouchstart="startDrag(event)">

        <div id="bouquet-screen">
            <img src="buket.png" alt="Букет" class="bouquet-img">
            <div class="bouquet-text">Покажи открытку маме!</div>
            <button class="next-button" onclick="showGiftScreen()">ДАЛЬШЕ</button>
        </div>

        <div id="gift-screen">
            <img src="gift.png" alt="Подарок" class="gift-img">
            <div class="gift-text">🌷 Нарисуй свои цветы для мамы! 🌷</div>
            <button class="pdf-button" onclick="downloadPDF()">🖨️ СКАЧАТЬ ДЕТАЛИ</button>
            <button class="again-button" onclick="resetGame()">🌟 ИГРАТЬ ЕЩЁ 🌟</button>
        </div>
    </div>

    <script>
        // ========== ПЕРЕМЕННЫЕ ==========
        let gameStage = 0; // 0 - старт, 1 - угадай, 2 - сбор
        let hintIndex = 0; // 0 - ромашка, 1 - роза, 2 - тюльпан
        let canTransition = false; // Флаг для перехода после звука
        const correctFlowers = ['romashka', 'rosa', 'tulpan'];
        
        // Счётчики для сбора
        let leftToCollect = {
            romashka: 4,
            rosa: 2,
            tulpan: 5
        };

        // Для перетаскивания
        let draggedFlower = null;
        let isDragging = false;
        let startX, startY, startLeft, startTop;
        let originalClasses = ''; // Для сохранения исходных классов

        // Звуки
        const sounds = {
            Zvuk1: new Audio('Zvuk1.mp3'),
            Zvuk2: new Audio('Zvuk2.mp3'),
            Zvuk3: new Audio('Zvuk3.mp3'),
            Zvuk4: new Audio('Zvuk4.mp3'),
            Zvuk5: new Audio('Zvuk5.mp3'),
            Zvuk6: new Audio('Zvuk6.mp3'),
            Zvuk7: new Audio('Zvuk7.mp3'),
            Zvuk8: new Audio('Zvuk8.mp3'),
            Zvuk9: new Audio('Zvuk9.mp3'),
            Zvuk10: new Audio('Zvuk10.mp3'),
            Zvuk11: new Audio('Zvuk11.mp3'),
            Zvuk12: new Audio('Zvuk12.mp3')
        };

        // Предзагрузка звуков
        for (let key in sounds) {
            sounds[key].load();
        }

        function playSound(soundName, callback) {
            try {
                if (sounds[soundName]) {
                    sounds[soundName].pause();
                    sounds[soundName].currentTime = 0;
                    
                    if (callback) {
                        sounds[soundName].onended = callback;
                    }
                    
                    sounds[soundName].play().catch(e => console.log('Аудио не воспроизвелось:', e));
                }
            } catch (e) {
                console.log('Ошибка воспроизведения звука:', e);
                if (callback) callback();
            }
        }

        // ========== ПОЗИЦИИ ДЛЯ 24 ЦВЕТОВ ==========
        function positionGridFlowers() {
            const positions = [
                'pos-1', 'pos-2', 'pos-3', 'pos-4', 'pos-5', 'pos-6',
                'pos-7', 'pos-8', 'pos-9', 'pos-10', 'pos-11', 'pos-12',
                'pos-13', 'pos-14', 'pos-15', 'pos-16', 'pos-17', 'pos-18',
                'pos-19', 'pos-20', 'pos-21', 'pos-22', 'pos-23', 'pos-24'
            ];
            
            const gridFlowers = document.querySelectorAll('.grid-flower');
            gridFlowers.forEach((flower, index) => {
                // Сохраняем класс позиции в data-атрибут для возврата
                flower.dataset.posClass = positions[index];
                flower.className = 'grid-flower hidden';
                flower.classList.add(positions[index]);
            });
        }

        // ========== СТАРТ ==========
        function startGame() {
            document.getElementById('start-btn').classList.add('hidden');
            gameStage = 1;
            hintIndex = 0;
            canTransition = false;
            playSound('Zvuk1');
            
            document.getElementById('konvert').classList.remove('hidden');
            
            document.querySelectorAll('.flower').forEach(f => f.classList.remove('hidden'));
            document.querySelectorAll('.grid-flower').forEach(f => {
                f.classList.add('hidden');
            });
            
            positionGridFlowers();
        }

        // ========== ПОДСКАЗКИ ==========
        function nextHint() {
            if (gameStage !== 1) return;
            
            document.getElementById('konvert').classList.add('hidden');
            
            if (hintIndex === 0) {
                playSound('Zvuk2');
            } else if (hintIndex === 1) {
                playSound('Zvuk5');
            } else if (hintIndex === 2) {
                playSound('Zvuk7');
            }
            
            let hintText = '';
            switch(hintIndex) {
                case 0: hintText = '🌼 Найди цветок с белыми лепестками и жёлтой серединкой'; break;
                case 1: hintText = '🌹 Найди цветок с шипами на стебле'; break;
                case 2: hintText = '🌷 Найди цветок с розовыми лепестками-капельками'; break;
            }
            
            alert(hintText);
        }

        // ========== ПРОВЕРКА ЦВЕТКА (первый этап) ==========
        function checkFlower(flowerName, element) {
            if (gameStage !== 1) return;
            if (element.classList.contains('found')) return;
            
            if (flowerName === correctFlowers[hintIndex]) {
                if (hintIndex === 0) {
                    playSound('Zvuk3');
                } else if (hintIndex === 1) {
                    playSound('Zvuk6');
                } else if (hintIndex === 2) {
                    playSound('Zvuk8', function() {
                        // После окончания звука тюльпана разрешаем переход
                        if (hintIndex === 2) {
                            canTransition = true;
                            // Проверяем, все ли цветы угаданы
                            if (hintIndex >= 2) {
                                playSound('Zvuk9');
                                startSecondStage();
                            }
                        }
                    });
                }
                
                element.classList.add('found');
                
                document.getElementById('konvert').classList.add('bounce');
                setTimeout(() => {
                    document.getElementById('konvert').classList.remove('bounce');
                }, 500);
                
                if (flowerName !== 'tulpan') {
                    setTimeout(() => {
                        hintIndex++;
                        
                        if (hintIndex < 3) {
                            document.getElementById('konvert').classList.remove('hidden');
                        }
                    }, 800);
                }
            } else {
                playSound('Zvuk4');
                element.classList.add('shake');
                setTimeout(() => {
                    element.classList.remove('shake');
                }, 400);
                
                setTimeout(() => {
                    document.getElementById('konvert').classList.remove('hidden');
                }, 500);
            }
        }

        // ========== ВТОРОЙ ЭТАП ==========
        function startSecondStage() {
            if (gameStage !== 1) return;
            if (hintIndex === 2 && !canTransition) return; // Ждём окончания звука тюльпана
            
            gameStage = 2;
            
            document.getElementById('konvert').classList.add('hidden');
            document.querySelectorAll('.flower').forEach(f => f.classList.add('hidden'));
            document.querySelectorAll('.grid-flower').forEach(f => f.classList.remove('hidden'));
            
            document.getElementById('korzina').classList.remove('hidden');
            document.getElementById('counters').classList.remove('hidden');
            
            leftToCollect = { romashka: 4, rosa: 2, tulpan: 5 };
            updateCounters();
        }

        // ========== ПЕРЕТАСКИВАНИЕ ==========
        function startDrag(e) {
            if (gameStage !== 2) return;
            e.preventDefault();
            
            const flower = e.target;
            if (flower.classList.contains('found')) return;
            
            draggedFlower = flower;
            isDragging = true;
            draggedFlower.classList.add('dragging');
            
            // Сохраняем исходные классы для возврата
            originalClasses = draggedFlower.className;
            
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            
            const rect = draggedFlower.getBoundingClientRect();
            const containerRect = document.getElementById('game-container').getBoundingClientRect();
            
            startX = clientX - rect.left;
            startY = clientY - rect.top;
            startLeft = rect.left - containerRect.left;
            startTop = rect.top - containerRect.top;
            
            draggedFlower.style.left = startLeft + 'px';
            draggedFlower.style.top = startTop + 'px';
            draggedFlower.style.zIndex = '100';
            
            document.addEventListener('mousemove', dragMove);
            document.addEventListener('touchmove', dragMove, { passive: false });
            document.addEventListener('mouseup', dragEnd);
            document.addEventListener('touchend', dragEnd);
        }

        function dragMove(e) {
            if (!isDragging || !draggedFlower) return;
            e.preventDefault();
            
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            
            const containerRect = document.getElementById('game-container').getBoundingClientRect();
            
            let newLeft = clientX - startX - containerRect.left;
            let newTop = clientY - startY - containerRect.top;
            
            const flowerWidth = draggedFlower.offsetWidth;
            const flowerHeight = draggedFlower.offsetHeight;
            
            newLeft = Math.max(0, Math.min(newLeft, containerRect.width - flowerWidth));
            newTop = Math.max(0, Math.min(newTop, containerRect.height - flowerHeight));
            
            draggedFlower.style.left = newLeft + 'px';
            draggedFlower.style.top = newTop + 'px';
        }

        function dragEnd(e) {
            if (!isDragging || !draggedFlower) return;
            
            // Проверяем, попал ли цветок в корзину
            const korzina = document.getElementById('korzina').getBoundingClientRect();
            const flowerRect = draggedFlower.getBoundingClientRect();
            const flowerCenterX = flowerRect.left + flowerRect.width / 2;
            const flowerCenterY = flowerRect.top + flowerRect.height / 2;
            
            const expandedKorzina = {
                left: korzina.left - 20,
                right: korzina.right + 20,
                top: korzina.top - 20,
                bottom: korzina.bottom + 20
            };
            
            if (flowerCenterX >= expandedKorzina.left && flowerCenterX <= expandedKorzina.right &&
                flowerCenterY >= expandedKorzina.top && flowerCenterY <= expandedKorzina.bottom) {
                
                const flowerName = draggedFlower.dataset.name;
                
                if (leftToCollect[flowerName] > 0) {
                    // Правильный сбор
                    leftToCollect[flowerName]--;
                    updateCounters();
                    
                    document.getElementById('korzina').classList.add('bounce');
                    setTimeout(() => {
                        document.getElementById('korzina').classList.remove('bounce');
                    }, 500);
                    
                    draggedFlower.classList.add('found');
                    
                    if (leftToCollect.romashka === 0 && leftToCollect.rosa === 0 && leftToCollect.tulpan === 0) {
                        setTimeout(() => {
                            showBouquetScreen();
                        }, 500);
                    }
                } else {
                    // Лишний цветок - звук 10 и возврат на место
                    playSound('Zvuk10');
                    // Возвращаем на исходную позицию, не добавляя в корзину
                    returnFlowerToStart(draggedFlower);
                }
            } else {
                // Не попал в корзину - возвращаем
                returnFlowerToStart(draggedFlower);
            }
            
            // Очищаем
            draggedFlower.classList.remove('dragging');
            draggedFlower.style.zIndex = '10';
            draggedFlower = null;
            isDragging = false;
            
            document.removeEventListener('mousemove', dragMove);
            document.removeEventListener('touchmove', dragMove);
            document.removeEventListener('mouseup', dragEnd);
            document.removeEventListener('touchend', dragEnd);
        }

        function returnFlowerToStart(flower) {
            // Возвращаем на исходную позицию по сохранённому классу
            const posClass = flower.dataset.posClass;
            if (posClass) {
                flower.className = 'grid-flower';
                flower.classList.add(posClass);
            }
        }

        function updateCounters() {
            document.getElementById('romashka-left').textContent = leftToCollect.romashka;
            document.getElementById('rosa-left').textContent = leftToCollect.rosa;
            document.getElementById('tulpan-left').textContent = leftToCollect.tulpan;
            
            if (leftToCollect.romashka === 0) {
                document.getElementById('counter-romashka').classList.add('completed');
            }
            if (leftToCollect.rosa === 0) {
                document.getElementById('counter-rosa').classList.add('completed');
            }
            if (leftToCollect.tulpan === 0) {
                document.getElementById('counter-tulpan').classList.add('completed');
            }
        }

        function showBouquetScreen() {
            gameStage = 3;
            document.getElementById('bouquet-screen').style.display = 'flex';
            playSound('Zvuk11'); // Только 11 звук
        }

        function showGiftScreen() {
            document.getElementById('bouquet-screen').style.display = 'none';
            document.getElementById('gift-screen').style.display = 'flex';
            playSound('Zvuk12'); // Только 12 звук после нажатия
        }

        function downloadPDF() {
            window.open('fail.pdf', '_blank');
        }

        function resetGame() {
            document.getElementById('bouquet-screen').style.display = 'none';
            document.getElementById('gift-screen').style.display = 'none';
            gameStage = 0;
            hintIndex = 0;
            canTransition = false;
            
            document.getElementById('start-btn').classList.remove('hidden');
            document.getElementById('konvert').classList.add('hidden');
            document.getElementById('korzina').classList.add('hidden');
            document.getElementById('counters').classList.add('hidden');
            
            document.querySelectorAll('.flower').forEach(f => {
                f.classList.remove('hidden');
                f.classList.remove('found');
            });
            
            document.querySelectorAll('.grid-flower').forEach(f => {
                f.classList.add('hidden');
                f.classList.remove('found');
            });
            
            document.getElementById('counter-romashka').classList.remove('completed');
            document.getElementById('counter-rosa').classList.remove('completed');
            document.getElementById('counter-tulpan').classList.remove('completed');
            
            leftToCollect = { romashka: 4, rosa: 2, tulpan: 5 };
            updateCounters();
        }

        // Глобальные функции
        window.startGame = startGame;
        window.nextHint = nextHint;
        window.checkFlower = checkFlower;
        window.startDrag = startDrag;
        window.showGiftScreen = showGiftScreen;
        window.downloadPDF = downloadPDF;
        window.resetGame = resetGame;

    </script>
</body>
</html>
